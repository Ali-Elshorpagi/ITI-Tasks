<html>

<head>
    <title>Task 05</title>
</head>

<body>
    <h1 align="center">Registeration</h1>
    <form method="post" action="./server.html">
        <table cellspacing="20" align="center">
            <tr>
                <td>Full Name</td>
                <td>User Name</td>
            </tr>
            <tr>
                <td> <input height="20px" type="text" placeHolder="Enter Your Name" name="name" size="70" /></td>
                <td> <input type="text" placeHolder="Enter User Name" name="username" size="70" /></td>
            </tr>
            <tr>
                <td>Email</td>
                <td>Phone Number</td>
            </tr>
            <tr>
                <td> <input type="email" placeHolder="Enter Your Email" name="emali" size="70" /></td>
                <td> <input type="phone" placeHolder="Enter Your Phone" name="phone" size="70" /></td>
            </tr>
            <tr>
                <td>Password</td>
                <td>Confirm Password</td>
            </tr>
            <tr>
                <td> <input type="password" placeHolder="Enter Your Password" name="password" size="70" /></td>
                <td> <input type="password" placeHolder="Confirm Your Password" name="phone" size="70" /></td>
            </tr>
            <tr>
                <td colspan="2">Gender</td>
            </tr>
            <tr>
                <td><input type="radio" name="gender" value="male" />Male</td>
                <td><input type="radio" name="gender" value="female" />Female</td>
                <td><input type="radio" name="gender" value="dont" />Prefer not to say</td>


            </tr>
            <tr>
                <td colspan="2" align="center" bgcolor="#faac7c"> <input type="submit" value="Register" /></td>
            </tr>
        </table>
    </form>
</body>

</html>
