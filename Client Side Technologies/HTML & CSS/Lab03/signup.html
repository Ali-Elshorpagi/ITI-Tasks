<html>

<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles/signup_style.css" />
</head>

<body>
    <table class="container-signup">
        <form method="post" action="products.html">
            <tr>
                <td>
                    <img class="center-item" src="./assets/pass.png" alt="man" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="text" placeHolder="Enter User Name" name="username" />
                </td>
            </tr>
            <tr>
                <td>
                    <img class="center-item" src="./assets/mail.png" alt="mail" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="email" placeHolder="Enter Your Email" name="email" />
                </td>
            </tr>
            <tr>
                <td>
                    <img class="center-item" src="./assets/passs.png" alt="passs" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="password" placeHolder="Enter Your Password" name="pass" />
                </td>
            </tr>
            <tr>
                <td>
                    <img class="center-item" src="./assets/passs.png" alt="passs" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="password" placeHolder="Rewrite Password" name="pass" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="submit" value="Register" />
                </td>
            </tr>
        </form>
        <tr align="center">
            <td>
                <a class="center-item" href="./login.html">Login</a>
            </td>
        </tr>
    </table>
</body>

</html>
