<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 01</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="left">
            <div class="child" draggable="true">
                <img src="../assets/radio.svg" alt="">
                <span>Single Selection</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/checkbox.svg" alt="">
                <span>Multiple Selection</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/star.svg" alt="">
                <span>Rating</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/text.svg" alt="">
                <span>Message</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/text.svg" alt="">
                <span>Short Text</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/text.svg" alt="">
                <span>Long Text</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/dropdown.svg" alt="">
                <span>Drop Down</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/sliders.svg" alt="">
                <span>Slider</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/star.svg" alt="">
                <span>Ranking</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/sliders.svg" alt="">
                <span>Sum</span>
            </div>
            <div class="child" draggable="true">
                <img src="../assets/hash.svg" alt="">
                <span>Numeric</span>
            </div>
        </div>
        <div class="right">
            <div class="page">
                <h2>Page 1</h2>
                <div class="drop-zone">
                    <span>Drag & drop your first question here</span>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
