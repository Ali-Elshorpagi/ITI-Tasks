<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="styles/login_style.css" />
</head>

<body>
    <table class="container-login">
        <form method="post" action="products.html">
            <tr>
                <td>
                    <img class="center-item" src="./assets/pass.png" alt="man" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="text" placeHolder="Enter User Name" name="username" />
                </td>
            </tr>
            <tr>
                <td>
                    <img class="center-item" src="./assets/passs.png" alt="man" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="password" placeHolder="Enter Your Password" name="pass" />
                </td>
            </tr>
            <tr>
                <td>
                    <input class="center-item" type="submit" value="Login" />
                </td>
            </tr>
        </form>
        <tr align="center">
            <td>
                <a href="./signup.html">Sign Up</a>
            </td>
        </tr>
    </table>

</body>

</html>
