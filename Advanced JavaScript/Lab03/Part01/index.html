<!DOCTYPE html>
<html lang="en">

<head>
    <title>Part 01</title>
    <link href="style.css" rel="stylesheet" />
    <script src="script.js"></script>
</head>

<body>
    <div class="search-container">
        <input type="text" id="SearchCountry" placeholder="Enter country name..." />
        <button id="btnData">Get Info</button>
    </div>

    <div id="countryInfo">
        <h2 id="countryName"></h2>
        <img id="flag" alt="Country Flag" width="200" />
        <p><strong>Capital:</strong> <span id="capital"></span></p>
        <p><strong>Region:</strong> <span id="region"></span></p>
        <p><strong>Population:</strong> <span id="population"></span></p>
        <p><strong>Currency:</strong> <span id="currency"></span></p>
    </div>

    <div id="neighbors">
        <h3>Neighbor Country:</h3>
        <h2 id="neighborName"></h2>
        <img id="neighborFlag" alt="Neighbor Flag" width="200" />
        <p><strong>Capital:</strong> <span id="neighborCapital"></span></p>
        <p><strong>Region:</strong> <span id="neighborRegion"></span></p>
        <p><strong>Population:</strong> <span id="neighborPopulation"></span></p>
        <p><strong>Currency:</strong> <span id="neighborCurrency"></span></p>
    </div>

</body>

</html>
